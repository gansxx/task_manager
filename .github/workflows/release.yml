name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          REF_NAME="${GITHUB_REF_NAME}"
          REF_TYPE="${GITHUB_REF_TYPE}"

          if [[ "$REF_TYPE" == "tag" ]]; then
            NORMALIZED_TAG="${REF_NAME#v}"
            if [[ "$MANIFEST_VERSION" != "$NORMALIZED_TAG" ]]; then
              echo "manifest.json version ($MANIFEST_VERSION) does not match tag ($REF_NAME)."
              exit 1
            fi
            RELEASE_TAG="$REF_NAME"
          else
            RELEASE_TAG="$MANIFEST_VERSION"
          fi

          echo "manifest_version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: npm run build

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.release_tag }}
          files: |
            manifest.json
            main.js
            styles.css
